version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventflow-postgres
    environment:
      POSTGRES_DB: eventflow
      POSTGRES_USER: eventflow
      POSTGRES_PASSWORD: eventflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventflow -d eventflow']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eventflow-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: eventflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: eventflow
      RABBITMQ_DEFAULT_PASS: eventflow
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build:
      context: ./backend
    container_name: eventflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/eventflow
      DB_USERNAME: eventflow
      DB_PASSWORD: eventflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: eventflow
      RABBITMQ_PASSWORD: eventflow
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-change-me-2026}
      CORS_ALLOWED_ORIGINS: http://localhost:4173,http://localhost:3000,http://localhost
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: eventflow-frontend
    depends_on:
      - backend
    ports:
      - '4173:80'

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
